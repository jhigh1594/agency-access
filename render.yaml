services:
  - type: web
    name: agency-access-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --no-audit --include=dev && npm run build --workspace=packages/shared && cd apps/api && npm run db:generate && npm run build
    startCommand: cd apps/api && DATABASE_URL="${MIGRATE_DATABASE_URL:-$DATABASE_URL}" PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK=1 npx prisma migrate deploy && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: API_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MIGRATE_DATABASE_URL
        sync: false
      - key: DB_ENFORCE_LEAST_PRIVILEGE
        value: true
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_OAUTH_ISSUER
        sync: false
      - key: CLERK_OAUTH_VERIFY_URL
        value: https://api.clerk.com/v1/oauth_applications/access_tokens/verify
      - key: AGENT_NATIVE_ENABLED
        value: false
      - key: AGENT_NATIVE_AGENCY_ALLOWLIST
        sync: false
      - key: AGENT_MCP_RESOURCE_URL
        sync: false
      - key: AGENT_READ_RATE_LIMIT
        value: 120
      - key: AGENT_MUTATION_RATE_LIMIT
        value: 30
      - key: AGENT_AGENCY_RATE_LIMIT
        value: 300
      - key: AGENT_RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: INFISICAL_CLIENT_ID
        sync: false
      - key: INFISICAL_CLIENT_SECRET
        sync: false
      - key: INFISICAL_PROJECT_ID
        sync: false
      - key: INFISICAL_ENVIRONMENT
        value: prod
      - key: BACKGROUND_WORKERS_ENABLED
        value: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: KIT_CLIENT_ID
        sync: false
      - key: KIT_CLIENT_SECRET
        sync: false
      - key: TIKTOK_CLIENT_ID
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false
      - key: MAILCHIMP_CLIENT_ID
        sync: false
      - key: MAILCHIMP_CLIENT_SECRET
        sync: false
      - key: PINTEREST_CLIENT_ID
        sync: false
      - key: PINTEREST_CLIENT_SECRET
        sync: false
      - key: KLAVIYO_CLIENT_ID
        sync: false
      - key: KLAVIYO_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET_KEY
        sync: false
      - key: BEEHIIV_API_KEY
        sync: false
      - key: CREEM_API_KEY
        sync: false
      - key: CREEM_WEBHOOK_SECRET
        sync: false
      - key: CREEM_API_URL
        value: https://api.creem.io
      - key: OAUTH_STATE_HMAC_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_WEBHOOK_SECRET
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: true
      - key: RATE_LIMIT_SKIP_AUTHENTICATED
        value: true
      - key: TRUST_PROXY_IPS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: INTERNAL_ADMIN_USER_IDS
        sync: false
      - key: INTERNAL_ADMIN_EMAILS
        sync: false
