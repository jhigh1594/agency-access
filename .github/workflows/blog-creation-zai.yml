name: Daily Blog Creation with z.ai API

on:
  schedule:
    # Runs every day at 7:00 AM PST (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  create-blog-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read blog creation workflow prompt
        id: read-prompt
        run: |
          # Read the workflow prompt
          WORKFLOW_PROMPT=$(cat .claude/prompts/blog-creation-workflow.md)
          echo "prompt_length=$(echo "$WORKFLOW_PROMPT" | wc -c)"

          # Save to file for next step
          echo "$WORKFLOW_PROMPT" > /tmp/workflow_prompt.md

      - name: Read content strategy files
        run: |
          # Read content strategy files for context
          echo "=== Content Strategy ===" > /tmp/context.md
          cat marketing/CONTENT-STRATEGY-2026.md >> /tmp/context.md
          echo "" >> /tmp/context.md
          echo "=== Content Calendar ===" >> /tmp/context.md
          cat marketing/content/CONTENT-CALENDAR-Q1-2026.md >> /tmp/context.md
          echo "" >> /tmp/context.md
          echo "=== Keyword Tracker ===" >> /tmp/context.md
          cat marketing/content/KEYWORD-TRACKER.md >> /tmp/context.md
          echo "" >> /tmp/context.md
          echo "=== Existing Blog Slugs (do not duplicate) ===" >> /tmp/context.md
          ls -1 apps/web/content/blog/*.md 2>/dev/null | xargs -I {} basename {} .md | sort >> /tmp/context.md || echo "(none)" >> /tmp/context.md

      - name: Generate blog post with z.ai API
        id: generate
        run: |
          echo "📖 Reading workflow prompt..."
          PROMPT=$(cat .claude/prompts/blog-creation-workflow.md)
          echo "✅ Workflow prompt read ($(echo "$PROMPT" | wc -c) characters)"

          echo "🤖 Calling z.ai API..."
          echo "🔑 API Endpoint: https://api.z.ai/api/anthropic/v1/messages"
          echo "📦 Model: glm-4.7"
          echo "🎯 Max tokens: 8000"

          # Call z.ai API (Anthropic-compatible endpoint)
          RESPONSE=$(curl -X POST "https://api.z.ai/api/anthropic/v1/messages" \
            -H "x-api-key: ${{ secrets.ZAI_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -s \
            -d '{
              "model": "glm-4.7",
              "max_tokens": 8000,
              "system": "You are a content marketing specialist for Agency Access Platform (authhub.co). Follow the workflow instructions exactly.",
              "messages": [
                {
                  "role": "user",
                  "content": "Read the blog creation workflow at .claude/prompts/blog-creation-workflow.md and execute all 7 phases:\\n\\n1. Research - Read marketing/CONTENT-STRATEGY-2026.md, marketing/content/CONTENT-CALENDAR-Q1-2026.md, marketing/content/KEYWORD-TRACKER.md, and list of existing slugs in apps/web/content/blog/ (one .md file per post)\\n\\n2. Select a topic autonomously based on: P0/P1 priorities, keyword gaps, strategic alignment. Do NOT duplicate an existing slug.\\n\\n3. Outline - INVOKE THE ELITE-COPYWRITER SKILL. Create outline following the CATEGORY TEMPLATE structure (not all posts follow TikTok Ads Access - choose based on category: tutorials, onboarding, comparisons, security, operations, case-studies, or research)\\n\\n4. Create - INVOKE THE ELITE-COPYWRITER SKILL AGAIN. Write complete blog post (2000-3000 words) with YAML frontmatter + markdown body.\\n\\n5. SEO - Include primary keyword in title/slug/H1/first paragraph/meta description. Add 3-5 internal links, 2-3 external links. Target featured snippet.\\n\\n6. Review - Check brand voice (professional, approachable, helpful). Verify content checklist.\\n\\n7. Output - Present final blog post as a Markdown file with YAML frontmatter, ready for apps/web/content/blog/{slug}.md\\n\\nCRITICAL OUTPUT FORMAT:\\n- Output ONLY a single Markdown file wrapped in a markdown code block (```markdown ... ```)\\n- Start with --- (YAML frontmatter) then newline, then frontmatter keys, then ---, then blank line, then full markdown body\\n- Frontmatter MUST include: id, title, excerpt, category, stage, publishedAt, readTime, author (as object with name, role), tags (YAML array), metaTitle, metaDescription, relatedPosts (optional array of post ids)\\n- Filename = slug; slug must be in frontmatter as the id (or derive from title). Use kebab-case slug for filename.\\n\\nExample format:\\n```markdown\\n---\\nid: your-blog-post-id\\ntitle: Compelling Headline (2026)\\nexcerpt: >-\\n  150-char summary\\ncategory: tutorials\\nstage: awareness\\npublishedAt: '2026-03-13'\\nreadTime: 5\\nauthor:\\n  name: AuthHub Team\\n  role: Agency Operations Experts\\ntags:\\n  - tag1\\n  - tag2\\n  - tag3\\nmetaTitle: SEO title\\nmetaDescription: SEO description\\n---\\n# Compelling Headline (2026)\\n\\nFull markdown body here...\\n```"
                }
              ]
            }')

          # Check if API call was successful
          if [ $? -ne 0 ]; then
            echo "❌ API call failed!"
            exit 1
          fi

          # Save response for debugging
          echo "$RESPONSE" > /tmp/zai_response.json
          echo "📄 Response saved to /tmp/zai_response.json"

          # Extract content from response
          CONTENT=$(echo "$RESPONSE" | jq -r '.content[0].text' 2>/dev/null)

          if [ -z "$CONTENT" ]; then
            echo "❌ Failed to extract content from response"
            echo "📄 Raw response:"
            echo "$RESPONSE" | head -c 500
            exit 1
          fi

          echo "$CONTENT" > /tmp/blog_post_raw.txt
          echo "✅ Blog post content extracted ($(echo "$CONTENT" | wc -c) characters)"

      - name: Extract and validate blog post content
        id: extract
        run: |
          # Extract Markdown with YAML frontmatter from response
          python3 << 'PYTHON_SCRIPT'
          import json
          import re

          with open('/tmp/zai_response.json', 'r') as f:
              response = json.load(f)

          if 'content' in response and len(response['content']) > 0:
              content_text = response['content'][0]['text']

              # Look for markdown code block
              md_match = re.search(r'```(?:markdown|md)?\n(.*?)\n```', content_text, re.DOTALL)
              if md_match:
                  md_content = md_match.group(1).strip()
              elif re.match(r'^---\s*\n', content_text):
                  # Raw content starts with frontmatter (no code block)
                  md_content = content_text.strip()
              else:
                  md_content = None

              if md_content and '---' in md_content:
                  with open('/tmp/blog_post.md', 'w') as out:
                      out.write(md_content)
                  with open('/tmp/blog_post_full.txt', 'w') as debug:
                      debug.write(content_text)
                  print("EXTRACTION_SUCCESS")
                  print(f"Length: {len(md_content)} characters")
              else:
                  print("NO_MARKDOWN_WITH_FRONTMATTER")
                  print(f"Content preview: {content_text[:500]}")
                  with open('/tmp/blog_post_raw.txt', 'w') as raw:
                      raw.write(content_text)
          else:
              print("NO_CONTENT_IN_RESPONSE")
              print(json.dumps(response, indent=2))
          PYTHON_SCRIPT

      - name: Validate blog post was created
        id: validate
        run: |
          if [ -f /tmp/blog_post.md ] && [ -s /tmp/blog_post.md ]; then
            echo "✅ Blog post Markdown generated successfully"
            head -30 /tmp/blog_post.md
          else
            echo "❌ Failed to extract blog post (expected /tmp/blog_post.md with YAML frontmatter)"
            echo "Raw response preview:"
            cat /tmp/zai_response.json | head -c 1000
            exit 1
          fi

      - name: Write blog post to content/blog
        id: update-blog
        run: |
          python3 << 'PYTHON_WRITE'
          import os
          import re

          with open('/tmp/blog_post.md', 'r') as f:
              content = f.read()

          # Extract slug from frontmatter (id = slug for filename)
          fm_match = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
          if not fm_match:
              raise SystemExit("No YAML frontmatter found")

          frontmatter = fm_match.group(1)
          slug = None
          for line in frontmatter.split('\n'):
              if line.strip().startswith('id:'):
                  slug = line.split(':', 1)[1].strip().strip('"\'')
                  break
          if not slug or not re.match(r'^[a-z0-9-]+$', slug):
              raise SystemExit(f"Invalid or missing id/slug in frontmatter: {slug!r}")

          out_dir = 'apps/web/content/blog'
          os.makedirs(out_dir, exist_ok=True)
          out_path = os.path.join(out_dir, f'{slug}.md')

          with open(out_path, 'w') as f:
              f.write(content)

          print(f"✅ Wrote {out_path}")
          print(f"slug={slug}")
          PYTHON_WRITE

      - name: Update content calendar
        run: |
          # Update the content calendar status
          # Mark the first P0/P1 item as "Published"
          TODAY=$(date +'%Y-%m-%d')
          sed -i.bak "s/\(P0\|P1\)/Published ($TODAY)/1" marketing/content/CONTENT-CALENDAR-Q1-2026.md
          rm -f marketing/content/CONTENT-CALENDAR-Q1-2026.md.bak

          echo "✅ Updated content calendar"

      - name: Update keyword tracker
        run: |
          # This would need more sophisticated parsing
          # For now, just note that a post was published
          echo "# Blog Post Published $TODAY" >> marketing/content/KEYWORD-TRACKER.md

      - name: Generate branch name
        id: branch-name
        run: |
          BRANCH_NAME="blog-post-$(date +%Y%m%d)"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "🌿 Branch name: $BRANCH_NAME"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "📝 Blog Post: AI Generated (${{ steps.branch-name.outputs.branch }})"
          body: |
            ## AI-Generated Blog Post

            This blog post was automatically generated using the z.ai API workflow.

            ### Changes
            - ✅ Added new blog post to `apps/web/content/blog/{slug}.md`
            - ✅ Updated content calendar status
            - ✅ Updated keyword tracker

            ### Review Checklist
            - [ ] Blog post follows TikTok Ads Access template structure
            - [ ] SEO optimized (keyword in title, slug, H1, first paragraph)
            - [ ] Internal links included (3-5 minimum)
            - [ ] External links to authoritative sources (2-3 minimum)
            - [ ] Brand voice consistent (professional, approachable)
            - [ ] All metadata fields complete
            - [ ] Read time calculated correctly

            ---
            🤖 Generated by z.ai API (GLM-4.7 model)
          branch: ${{ steps.branch-name.outputs.branch }}
          delete-branch: true
          draft: false
