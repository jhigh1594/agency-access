name: Daily Blog Creation with z.ai API

on:
  schedule:
    # Runs every day at 7:00 AM PST (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  create-blog-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read blog creation workflow prompt
        id: read-prompt
        run: |
          # Read the workflow prompt
          WORKFLOW_PROMPT=$(cat .claude/prompts/blog-creation-workflow.md)
          echo "prompt_length=$(echo "$WORKFLOW_PROMPT" | wc -c)"

          # Save to file for next step
          echo "$WORKFLOW_PROMPT" > /tmp/workflow_prompt.md

      - name: Read content strategy files
        run: |
          # Read content strategy files for context
          echo "=== Content Strategy ===" > /tmp/context.md
          cat marketing/CONTENT-STRATEGY-2026.md >> /tmp/context.md
          echo "" >> /tmp/context.md
          echo "=== Content Calendar ===" >> /tmp/context.md
          cat marketing/content/CONTENT-CALENDAR-Q1-2026.md >> /tmp/context.md
          echo "" >> /tmp/context.md
          echo "=== Keyword Tracker ===" >> /tmp/context.md
          cat marketing/content/KEYWORD-TRACKER.md >> /tmp/context.md
          echo "" >> /tmp/context.md
          echo "=== Existing Blog Slugs (do not duplicate) ===" >> /tmp/context.md
          ls -1 apps/web/content/blog/*.md 2>/dev/null | xargs -I {} basename {} .md | sort >> /tmp/context.md || echo "(none)" >> /tmp/context.md

      - name: Pre-process blog content for patterns
        id: analyze-content
        run: |
          python3 << 'PYTHON_ANALYZE'
          import os
          import re
          from pathlib import Path

          # Read existing blog posts
          blog_dir = Path('apps/web/content/blog')
          posts = []

          for md_file in sorted(blog_dir.glob('*.md')):
              with open(md_file, 'r') as f:
                  content = f.read()

              # Extract frontmatter
              fm_match = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
              if fm_match:
                  frontmatter = fm_match.group(1)
                  category = None
                  for line in frontmatter.split('\n'):
                      if line.strip().startswith('category:'):
                          category = line.split(':', 1)[1].strip().strip('"\'')
                          break
                  posts.append({
                      'file': md_file.stem,
                      'category': category or 'unknown'
                  })

          # Count by category
          from collections import Counter
          category_counts = Counter(p['category'] for p in posts)

          # Generate pattern summary
          print("=== BLOG CONTENT PATTERNS ===")
          print(f"Total posts: {len(posts)}")
          print(f"Categories: {dict(category_counts)}")
          print(f"Recent posts: {[p['file'] for p in posts[-5:]]}")
          print("\n=== STRUCTURE OBSERVATIONS ===")

          # Read one example from each category for patterns
          examples_by_category = {}
          for post in posts:
              cat = post['category']
              if cat not in examples_by_category and cat != 'unknown':
                  with open(blog_dir / f"{post['file']}.md", 'r') as f:
                      examples_by_category[cat] = f.read()[:3000]  # First 3000 chars

          for cat, content in examples_by_category.items():
              print(f"\n## {cat.upper()} PATTERN:")
              # Extract H2 headings
              h2_matches = re.findall(r'^##\s+(.+)$', content, re.MULTILINE)
              print(f"  H2 structure: {h2_matches[:5]}")

          # Save to file for prompt injection
          with open('/tmp/blog_patterns.md', 'w') as out:
              out.write("# Blog Content Patterns\n\n")
              out.write(f"Total posts: {len(posts)}\n")
              out.write(f"Categories: {dict(category_counts)}\n\n")
              out.write("## Recent Slugs (do not duplicate)\n")
              for p in posts:
                  out.write(f"- {p['file']}\n")
              out.write("\n## Category Structures\n")
              for cat, content in examples_by_category.items():
                  out.write(f"\n### {cat}\n")
                  h2_matches = re.findall(r'^##\s+(.+)$', content, re.MULTILINE)
                  out.write(f"H2s: {h2_matches}\n")

          print("✅ Blog patterns saved to /tmp/blog_patterns.md")
          PYTHON_ANALYZE

      - name: Generate blog post with z.ai API
        id: generate
        run: |
          echo "📖 Reading workflow prompt and context files..."

          # Read content files
          WORKFLOW_PROMPT=$(cat .claude/prompts/blog-creation-workflow.md)
          BLOG_PATTERNS=$(cat /tmp/blog_patterns.md)
          CONTENT_STRATEGY=$(cat marketing/CONTENT-STRATEGY-2026.md | head -c 8000)
          KEYWORD_TRACKER=$(cat marketing/content/KEYWORD-TRACKER.md | head -c 5000)
          EXISTING_SLUGS=$(ls -1 apps/web/content/blog/*.md 2>/dev/null | xargs -I {} basename {} .md | tr '\n' ', ' || echo "(none)")

          echo "✅ Workflow prompt read ($(echo "$WORKFLOW_PROMPT" | wc -c) characters)"
          echo "✅ Blog patterns loaded ($(echo "$BLOG_PATTERNS" | wc -c) characters)"
          echo "✅ Content strategy loaded ($(echo "$CONTENT_STRATEGY" | wc -c) characters)"
          echo "✅ Keyword tracker loaded ($(echo "$KEYWORD_TRACKER" | wc -c) characters)"

          echo "🤖 Calling z.ai API..."
          echo "🔑 API Endpoint: https://api.z.ai/api/anthropic/v1/messages"
          echo "📦 Model: glm-4.7"
          echo "🎯 Max tokens: 8000"

          # Build JSON payload using Python for proper escaping
          # Pass variables via environment to avoid shell quoting issues
          export WORKFLOW_PROMPT BLOG_PATTERNS CONTENT_STRATEGY KEYWORD_TRACKER EXISTING_SLUGS
          PAYLOAD=$(python3 << 'PYTHON_PAYLOAD'
import json
import os

# Read content from environment variables
workflow = os.environ.get('WORKFLOW_PROMPT', '')
patterns = os.environ.get('BLOG_PATTERNS', '')
strategy = os.environ.get('CONTENT_STRATEGY', '')
keywords = os.environ.get('KEYWORD_TRACKER', '')
slugs = os.environ.get('EXISTING_SLUGS', '(none)')

user_content = f"""You are creating a blog post for Agency Access Platform (authhub.co).

=== WORKFLOW INSTRUCTIONS ===
{workflow}

=== BLOG PATTERNS ===
{patterns}

=== CONTENT STRATEGY ===
{strategy}

=== KEYWORD TRACKER ===
{keywords}

=== EXECUTION INSTRUCTIONS ===
Using the workflow instructions above, create a complete blog post:
1. Follow all 7 phases from the workflow instructions
2. Select a topic from KEYWORD TRACKER (prioritize P0 > P1 > P2)
3. Use the blog patterns to match structure by category
4. Apply copywriting_guidance for tone and style
5. Do NOT duplicate an existing slug: {slugs}

When selecting a topic, consider:
- Monthly search volume (higher = more traffic potential)
- Priority level (P0 > P1 > P2)
- Whether a target page is already assigned
- Content pillar alignment

Output ONLY a markdown code block with the complete blog post including YAML frontmatter.

Example format:
```markdown
---
id: your-blog-post-id
title: Compelling Headline (2026)
excerpt: >-
  150-char summary
category: tutorials
stage: awareness
publishedAt: '2026-03-13'
readTime: 5
author:
  name: AuthHub Team
  role: Agency Operations Experts
tags:
  - tag1
  - tag2
metaTitle: SEO title
metaDescription: SEO description
---
# Compelling Headline (2026)

Full markdown body here...
```"""

payload = {
    "model": "glm-4.7",
    "max_tokens": 8000,
    "system": "You are a content marketing specialist for Agency Access Platform (authhub.co). Follow the workflow instructions exactly.",
    "messages": [
        {
            "role": "user",
            "content": user_content
        }
    ]
}

print(json.dumps(payload))
PYTHON_PAYLOAD
)

          # Call z.ai API (Anthropic-compatible endpoint)
          RESPONSE=$(curl -X POST "https://api.z.ai/api/anthropic/v1/messages" \
            -H "x-api-key: ${{ secrets.ZAI_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -s \
            -d "$PAYLOAD")

          # Check if API call was successful
          if [ $? -ne 0 ]; then
            echo "❌ API call failed!"
            exit 1
          fi

          # Save response for debugging
          echo "$RESPONSE" > /tmp/zai_response.json
          echo "📄 Response saved to /tmp/zai_response.json"

          # Extract content from response
          CONTENT=$(echo "$RESPONSE" | jq -r '.content[0].text' 2>/dev/null)

          if [ -z "$CONTENT" ]; then
            echo "❌ Failed to extract content from response"
            echo "📄 Raw response:"
            echo "$RESPONSE" | head -c 500
            exit 1
          fi

          echo "$CONTENT" > /tmp/blog_post_raw.txt
          echo "✅ Blog post content extracted ($(echo "$CONTENT" | wc -c) characters)"

      - name: Extract and validate blog post content
        id: extract
        run: |
          # Extract Markdown with YAML frontmatter from response
          python3 << 'PYTHON_SCRIPT'
          import json
          import re

          with open('/tmp/zai_response.json', 'r') as f:
              response = json.load(f)

          if 'content' in response and len(response['content']) > 0:
              content_text = response['content'][0]['text']

              # Look for markdown code block
              md_match = re.search(r'```(?:markdown|md)?\n(.*?)\n```', content_text, re.DOTALL)
              if md_match:
                  md_content = md_match.group(1).strip()
              elif re.match(r'^---\s*\n', content_text):
                  # Raw content starts with frontmatter (no code block)
                  md_content = content_text.strip()
              else:
                  md_content = None

              if md_content and '---' in md_content:
                  with open('/tmp/blog_post.md', 'w') as out:
                      out.write(md_content)
                  with open('/tmp/blog_post_full.txt', 'w') as debug:
                      debug.write(content_text)
                  print("EXTRACTION_SUCCESS")
                  print(f"Length: {len(md_content)} characters")
              else:
                  print("NO_MARKDOWN_WITH_FRONTMATTER")
                  print(f"Content preview: {content_text[:500]}")
                  with open('/tmp/blog_post_raw.txt', 'w') as raw:
                      raw.write(content_text)
          else:
              print("NO_CONTENT_IN_RESPONSE")
              print(json.dumps(response, indent=2))
          PYTHON_SCRIPT

      - name: Validate blog post was created
        id: validate
        run: |
          if [ -f /tmp/blog_post.md ] && [ -s /tmp/blog_post.md ]; then
            echo "✅ Blog post Markdown generated successfully"
            head -30 /tmp/blog_post.md
          else
            echo "❌ Failed to extract blog post (expected /tmp/blog_post.md with YAML frontmatter)"
            echo "Raw response preview:"
            cat /tmp/zai_response.json | head -c 1000
            exit 1
          fi

      - name: Write blog post to content/blog
        id: update-blog
        run: |
          python3 << 'PYTHON_WRITE'
          import os
          import re

          with open('/tmp/blog_post.md', 'r') as f:
              content = f.read()

          # Extract slug from frontmatter (id = slug for filename)
          fm_match = re.match(r'^---\s*\n(.*?)\n---', content, re.DOTALL)
          if not fm_match:
              raise SystemExit("No YAML frontmatter found")

          frontmatter = fm_match.group(1)
          slug = None
          for line in frontmatter.split('\n'):
              if line.strip().startswith('id:'):
                  slug = line.split(':', 1)[1].strip().strip('"\'')
                  break
          if not slug or not re.match(r'^[a-z0-9-]+$', slug):
              raise SystemExit(f"Invalid or missing id/slug in frontmatter: {slug!r}")

          out_dir = 'apps/web/content/blog'
          os.makedirs(out_dir, exist_ok=True)
          out_path = os.path.join(out_dir, f'{slug}.md')

          with open(out_path, 'w') as f:
              f.write(content)

          print(f"✅ Wrote {out_path}")
          print(f"slug={slug}")
          PYTHON_WRITE

      - name: Update content calendar
        run: |
          # Update the content calendar status
          # Mark the first P0/P1 item as "Published"
          TODAY=$(date +'%Y-%m-%d')
          sed -i.bak "s/\(P0\|P1\)/Published ($TODAY)/1" marketing/content/CONTENT-CALENDAR-Q1-2026.md
          rm -f marketing/content/CONTENT-CALENDAR-Q1-2026.md.bak

          echo "✅ Updated content calendar"

      - name: Update keyword tracker
        run: |
          # This would need more sophisticated parsing
          # For now, just note that a post was published
          echo "# Blog Post Published $TODAY" >> marketing/content/KEYWORD-TRACKER.md

      - name: Generate branch name
        id: branch-name
        run: |
          BRANCH_NAME="blog-post-$(date +%Y%m%d)"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "🌿 Branch name: $BRANCH_NAME"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "📝 Blog Post: AI Generated (${{ steps.branch-name.outputs.branch }})"
          body: |
            ## AI-Generated Blog Post

            This blog post was automatically generated using the z.ai API workflow.

            ### Changes
            - ✅ Added new blog post to `apps/web/content/blog/{slug}.md`
            - ✅ Updated content calendar status
            - ✅ Updated keyword tracker

            ### Review Checklist
            - [ ] Blog post follows TikTok Ads Access template structure
            - [ ] SEO optimized (keyword in title, slug, H1, first paragraph)
            - [ ] Internal links included (3-5 minimum)
            - [ ] External links to authoritative sources (2-3 minimum)
            - [ ] Brand voice consistent (professional, approachable)
            - [ ] All metadata fields complete
            - [ ] Read time calculated correctly

            ---
            🤖 Generated by z.ai API (GLM-4.7 model)
          branch: ${{ steps.branch-name.outputs.branch }}
          delete-branch: true
          draft: false
